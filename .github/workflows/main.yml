name: Actualizador Horario Roku
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v3
      
      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Instalar Requests
        run: pip install requests
        
      - name: Ejecutar el extractor
        run: python extractor.py
        
      - name: Guardar en GitHub
        run: |
          git config --global user.name 'Robot Actualizador'
          git config --global user.email 'robot@github.com'
          git add canales.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Actualización automática de links" && git push)
